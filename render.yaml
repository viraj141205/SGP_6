# Render Blueprint for AgroVision AI
services:
  # Backend Web Service
  - type: web_service
    name: agrovision-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./agrovision.db
      - key: CORS_ORIGINS
        value: "*"

  # Frontend Web Service
  - type: web_service
    name: agrovision-frontend
    env: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run serve
    envVars:
      - key: VITE_API_BASE_URL
        fromStack:
          name: agrovision-backend
          prop: url
