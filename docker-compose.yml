version: '3.9'

services:
  backend:
    build: ./backend
    container_name: agrovision-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
      - ./backend/ml/saved_models:/app/ml/saved_models
      - ./backend/agrovision.db:/app/agrovision.db
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production-use-long-random-string}
      - DATABASE_URL=sqlite:///./agrovision.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    networks:
      - agrovision-network

  frontend:
    build: ./frontend
    container_name: agrovision-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - agrovision-network

networks:
  agrovision-network:
    driver: bridge
